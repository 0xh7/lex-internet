name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...

  go-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false
      - name: Check formatting
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

  c-build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build C library
        run: make -C c

  c-build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Keep LF line endings for MSYS2 tools
        shell: pwsh
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: make mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils
      - name: Build C library
        run: make -C c clean all CC=gcc AR=ar
