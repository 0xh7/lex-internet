name: release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-go:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_name: lex-internet_linux_amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            archive_name: lex-internet_windows_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false
      - name: Build binaries
        run: make build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - name: Archive binaries (Linux)
        if: runner.os == 'Linux'
        run: tar -C bin/${{ matrix.goos }}-${{ matrix.goarch }} -czf ${{ matrix.archive_name }}.tar.gz .
      - name: Archive binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "bin/${{ matrix.goos }}-${{ matrix.goarch }}/*" -DestinationPath "${{ matrix.archive_name }}.zip"
      - name: Upload Go archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            ${{ matrix.archive_name }}.tar.gz
            ${{ matrix.archive_name }}.zip
          if-no-files-found: error

  build-c:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: libnetstack_linux_amd64
          - os: windows-latest
            artifact_name: libnetstack_windows_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build C library (Linux)
        if: runner.os == 'Linux'
        run: make -C c
      - name: Keep LF line endings for MSYS2 tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.autocrlf input
      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: MINGW64
          update: true
          install: make mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils
      - name: Build C library (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make -C c clean all CC=gcc AR=ar
      - name: Archive C library (Linux)
        if: runner.os == 'Linux'
        run: tar -C c -czf ${{ matrix.artifact_name }}.tar.gz libnetstack.a
      - name: Archive C library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "c/libnetstack.a" -DestinationPath "${{ matrix.artifact_name }}.zip"
      - name: Upload C archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-go
      - build-c
    steps:
      - uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Validate downloaded artifacts
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found under dist/"
            exit 1
          fi
          printf 'Will publish %s artifacts\n' "${#files[@]}"
          printf '%s\n' "${files[@]}"
      - name: Create release and upload files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -d '' files < <(find dist -type f -print0)
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --generate-notes
          gh release upload "$tag" "${files[@]}" --clobber
