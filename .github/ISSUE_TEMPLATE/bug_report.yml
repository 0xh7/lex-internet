name: Bug report
description: Report a reproducible bug or protocol regression
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Keep this report tight and reproducible. Exact steps are more useful than a long backstory.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: One short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact commands, inputs, or packets needed to reproduce the problem.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: packages
    attributes:
      label: Affected package or command
      placeholder: pkg/dns, cmd/http-server, c/packet_parser, ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
        - Other
        - Multiple
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste the lines that matter: logs, traces, or error messages.
      render: shell
